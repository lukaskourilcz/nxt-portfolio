<?xml version="1.0" encoding="UTF-8"?>
<!-- PLACEHOLDER hero illustration — an abstract emerald aurora on zinc, sized
     for the hero's right column (square-ish). Replace with a bespoke
     Recraft/Ideogram piece (keep the filename) and wire it into
     src/app/components/hero/HeroSection.tsx — see NEEDED.md. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-label="Abstract hero artwork placeholder">
  <defs>
    <radialGradient id="a" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b" cx="75%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#3f3f46" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="640" height="640" fill="#0b0b0d"/>
  <rect width="640" height="640" fill="url(#grid)"/>
  <rect width="640" height="640" fill="url(#a)"/>
  <rect width="640" height="640" fill="url(#b)"/>
  <g fill="none" stroke="#34d399" stroke-opacity="0.5" stroke-width="1.5">
    <circle cx="320" cy="320" r="120"/>
    <circle cx="320" cy="320" r="180" stroke-opacity="0.25"/>
  </g>
  <text x="320" y="330" text-anchor="middle" font-family="monospace" font-size="20"
